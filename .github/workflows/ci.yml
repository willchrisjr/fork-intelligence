name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: checks
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: fork_intelligence
          POSTGRES_USER: fork_intelligence
          POSTGRES_PASSWORD: fork_intelligence
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U fork_intelligence"
          --health-interval 5s --health-timeout 5s --health-retries 20
      redis:
        image: redis:7.4-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 20
    env:
      DATABASE_URL: postgresql+psycopg://fork_intelligence:fork_intelligence@localhost:5432/fork_intelligence
      REDIS_URL: redis://localhost:6379/0
      FORK_INTELLIGENCE_RUN_POSTGRES_TESTS: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 11.7.0
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm
      - name: Set up Python and uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.13"
          enable-cache: true
      - name: Install JavaScript dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Python dependencies
        run: uv sync --directory services/platform --all-groups --frozen
      - name: Migrate database up
        run: pnpm db:migrate
      - name: Verify migration rollback
        run: uv run --directory services/platform alembic downgrade base
      - name: Reapply migrations
        run: pnpm db:migrate
      - name: Run format, lint, type, unit, integration, contract, build, and secret checks
        run: pnpm check:ci
      - name: Install Chromium
        run: pnpm --filter @fork-intelligence/web exec playwright install --with-deps chromium
      - name: Run browser tests
        run: pnpm test:e2e
